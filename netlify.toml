[[redirects]]
  from = "/fog"
  to = "/"
  status = 301

[[redirects]]
  from = "/fog/"
  to = "/"
  status = 301

[[redirects]]
  from = "/timing-movie"
  to = "/timing-movie/"
  status = 301

[[redirects]]
  from = "/new-folder"
  to = "/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
